<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soju-JJAN!🍻</title>
    <style>
        @font-face {
            font-family: 'DungGeunMo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
            font-weight: normal; font-style: normal;
        }

        /* 전체 화면 레이아웃 (좌/우 분할) */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            font-family: 'DungGeunMo', sans-serif;
            display: flex; 
            background-color: #111;
        }

        /* 왼쪽 배경 영역 */
        #bg-area {
            flex: 1; 
            position: relative;
            background-color: #2b2b2b; 
            background-size: cover;
            background-position: center;
        }

        /* 오른쪽 채팅 영역 */
        #chat-panel {
            width: 350px;
            background-color: rgba(255, 255, 255, 0.95);
            border-left: 3px solid #000;
            display: flex;
            flex-direction: column;
            box-shadow: -4px 0px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* UI 버튼 컨테이너 */
        .ui-container {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 10px;
        }

        .btn-style {
            padding: 8px 12px; font-family: 'DungGeunMo', sans-serif; font-size: 0.9rem;
            background: #fff; border: 3px solid #000; box-shadow: 4px 4px 0px #000;
            cursor: pointer; text-decoration: none; color: #000; width: max-content;
        }
        .btn-style:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }

        /* 🟢 CSS 소주병 아이콘 */
        .soju-icon {
            display: inline-block;
            width: 14px; height: 22px;
            background-color: #1B4B27; 
            border-radius: 2px 2px 3px 3px;
            position: relative;
            vertical-align: middle;
            margin: 0 10px;
        }
        .soju-icon::before { 
            content: ''; position: absolute;
            top: -6px; left: 3px;
            width: 8px; height: 6px;
            background-color: #1B4B27;
        }
        .soju-icon::after { 
            content: ''; position: absolute;
            top: -8px; left: 2px;
            width: 10px; height: 2px;
            background-color: #e0e0e0; 
            border-radius: 1px;
        }
        .soju-label { 
            position: absolute;
            top: 5px; left: 2px;
            width: 10px; height: 12px;
            background-color: #ffffff;
            border-radius: 1px;
        }

        /* 채팅 제목 바 */
        .chat-header {
            background: #000; color: #fff; text-align: center; padding: 12px; 
            font-size: 1.1rem; display: flex; justify-content: center; align-items: center;
            flex-shrink: 0;
        }

        /* 채팅 로그 및 이력 영역 */
        #chat-log {
            box-sizing: border-box;
            position: absolute; bottom: 75px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 350px; height: 130px; 
            background: rgba(255, 255, 255, 0.4); 
            border: 3px solid #000; border-radius: 0; box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
            padding: 8px 10px; overflow-y: auto; z-index: 5; 
            display: flex; flex-direction: column; gap: 5px; 
        }
        .log-item { font-size: 0.9rem; word-break: break-all; line-height: 1.4; }
        
        /* 닉네임 배경 (소주병 초록색 + 하얀 글씨) */
        .log-nickname { 
            background: #1B4B27; 
            color: #ffffff; 
            padding: 3px 6px; 
            margin-right: 6px; 
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
        }

        /* 채팅 입력 영역 */
        .input-wrapper {
            display: flex; padding: 10px; background: #fff; border-top: 3px solid #000;
            flex-shrink: 0;
        }
        input[type="text"] {
            flex: 1; padding: 8px; font-family: 'DungGeunMo', sans-serif;
            border: 2px solid #000; outline: none; font-size: 0.9rem;
        }
        input[type="text"]:disabled { background-color: #ddd; color: #f00; }

        /* JJAN! 버튼 (소주병 초록색 + 하얀 글씨) */
        #sendBtn {
            margin-left: 5px; padding: 8px 15px; font-family: 'DungGeunMo', sans-serif;
            background: #1B4B27; color: #ffffff; border: 2px solid #000; 
            cursor: pointer; font-weight: bold;
        }
        #sendBtn:active { transform: translateY(2px); }

        /* 팝업창 스타일 */
        .popup {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 400px; background: #fff; border: 4px solid #000;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.5); z-index: 100; padding: 15px;
            flex-direction: column; gap: 10px;
        }
        .popup-header { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 5px; }
        .close-btn { background: none; border: none; font-family: 'DungGeunMo', sans-serif; font-size: 1.2rem; cursor: pointer; }

        /* JJAN! 이펙트 */
        .jjan-effect {
            position: absolute; color: #fff; font-size: 1.5rem; font-weight: bold;
            text-shadow: 2px 2px 0px #000; pointer-events: none;
            animation: floatUp 1s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }

        @media (max-width: 768px) {
            body, html { flex-direction: column; }
            #bg-area { flex: 0.6; }
            #chat-panel { width: 100%; flex: 0.4; border-left: none; border-top: 3px solid #000; }
        }
    </style>
</head>
<body>

    <div id="bg-area">
        <div class="ui-container">
            <button id="noticeToggleBtn" class="btn-style">📢 Notice</button>
            <a href="#" target="_blank" class="btn-style">💡 Update Notes</a>
            <button id="boardToggleBtn" class="btn-style">✨ Drop a vibe</button>
        </div>
    </div>

    <div id="chat-panel">
        <div class="chat-header">
            <div class="soju-icon"><div class="soju-label"></div></div>
            JJAN CHAT
            <div class="soju-icon"><div class="soju-label"></div></div>
        </div>
        <div id="chat-log"></div>
        <div class="input-wrapper">
            <input type="text" id="chatInput" maxlength="30" placeholder="Type a message..." autocomplete="off">
            <button id="sendBtn">JJAN!</button>
        </div>
    </div>

    <div id="noticePopup" class="popup">
        <div class="popup-header">
            <span>📢 Notice</span>
            <button id="noticeCloseBtn" class="close-btn">X</button>
        </div>
        <div id="noticeContent" style="padding: 10px; background: #eee; border: 2px solid #000; min-height: 100px; white-space: pre-wrap;">
            Loading...
        </div>
        <button id="noticeEditBtn" class="btn-style" style="align-self: flex-end; font-size: 0.8rem;">✏️ Edit (Admin)</button>
    </div>

    <div id="boardPopup" class="popup">
        <div class="popup-header">
            <span>✨ Drop your vibe here</span>
            <button id="boardCloseBtn" class="close-btn">X</button>
        </div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="boardInput" style="flex: 1; padding: 5px; font-family: 'DungGeunMo', sans-serif;" placeholder="What's the tea?" maxlength="40">
            <button id="boardSubmitBtn" class="btn-style" style="padding: 5px 10px;">Post</button>
        </div>
        <div id="boardList" style="flex: 1; height: 150px; overflow-y: auto; background: #fafafa; border: 2px solid #000; padding: 5px;"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        const adjectives = ["Cool", "Chill", "Dope", "Savage", "Boujee", "Lit", "Wild", "Funky", "Sunny", "Lucky", "Sassy", "Brave", "Glowy", "Hype", "Zesty"];
        const nouns = ["Tiger", "Bear", "Cat", "Dog", "Fox", "Panda", "Eagle", "Rabbit", "Otter", "Penguin", "Dragon", "Shark", "Monkey", "Owl", "Seal"];
        const myNickname = adjectives[Math.floor(Math.random() * adjectives.length)] + " " + nouns[Math.floor(Math.random() * nouns.length)];

        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatLog = document.getElementById('chat-log'); 
        const bgArea = document.getElementById('bg-area');

        socket.emit('user connect', myNickname);

        function appendToChatLog(nickname, text) {
            const div = document.createElement('div');
            div.classList.add('log-item');
            div.innerHTML = `<span class="log-nickname">${nickname}</span> ${text}`;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        socket.on('chat message', (data) => {
            appendToChatLog(data.nickname, data.message);
        });

        function createJjanEffect() {
            const effect = document.createElement('div');
            effect.classList.add('jjan-effect');
            effect.innerText = "🍻 JJAN!";
            effect.style.left = (Math.random() * 80 + 10) + '%';
            effect.style.top = (Math.random() * 80 + 10) + '%';
            bgArea.appendChild(effect);
            setTimeout(() => effect.remove(), 1000);
        }

        function sendMessage() {
            const text = chatInput.value.trim();
            if(!text) return;
            socket.emit('chat message', { nickname: myNickname, message: text });
            chatInput.value = '';
            chatInput.focus();
            createJjanEffect(); 
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        const togglePopup = (btnId, popupId, closeId) => {
            const btn = document.getElementById(btnId);
            const popup = document.getElementById(popupId);
            const close = document.getElementById(closeId);
            if(btn && popup && close) {
                btn.addEventListener('click', () => popup.style.display = 'flex');
                close.addEventListener('click', () => popup.style.display = 'none');
            }
        };

        togglePopup('noticeToggleBtn', 'noticePopup', 'noticeCloseBtn');
        togglePopup('boardToggleBtn', 'boardPopup', 'boardCloseBtn');

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const noticePopup = document.getElementById('noticePopup');
                const boardPopup = document.getElementById('boardPopup');
                if(noticePopup) noticePopup.style.display = 'none';
                if(boardPopup) boardPopup.style.display = 'none';
            }
        });

        const boardSubmitBtn = document.getElementById('boardSubmitBtn');
        const boardInput = document.getElementById('boardInput');
        const boardList = document.getElementById('boardList');

        if(boardSubmitBtn && boardInput && boardList) {
            boardSubmitBtn.addEventListener('click', () => {
                const text = boardInput.value.trim();
                if(!text) return;
                socket.emit('save board message', { nickname: myNickname, message: text });
                boardInput.value = '';
            });

            socket.on('load board', (messages) => {
                boardList.innerHTML = '';
                messages.forEach(data => {
                    const item = document.createElement('div');
                    item.style.borderBottom = "1px dashed #ccc";
                    item.style.padding = "4px 0";
                    item.style.fontSize = "0.85rem";
                    item.innerHTML = `<b>[${data.nickname}]</b> ${data.message}`;
                    boardList.appendChild(item);
                });
            });
        }

        const noticeEditBtn = document.getElementById('noticeEditBtn');
        let tempPassword = "";

        socket.on('load notice', (noticeText) => {
            const content = document.getElementById('noticeContent');
            if(content) {
                if (content.tagName === 'TEXTAREA') {
                    content.outerHTML = `<div id="noticeContent" style="padding: 10px; background: #eee; border: 2px solid #000; min-height: 100px; white-space: pre-wrap;"></div>`;
                    if(noticeEditBtn) noticeEditBtn.innerText = "✏️ Edit (Admin)";
                }
                const updatedContent = document.getElementById('noticeContent');
                if(updatedContent) updatedContent.innerText = noticeText;
            }
        });

        socket.on('notice error', () => alert("Incorrect Password! 🙅‍♂️"));

        if(noticeEditBtn) {
            noticeEditBtn.addEventListener('click', () => {
                const content = document.getElementById('noticeContent');
                if(content) {
                    if (content.tagName === 'DIV') {
                        const pwd = prompt("Enter Admin Password:");
                        if (pwd) {
                            tempPassword = pwd;
                            const text = content.innerText;
                            content.outerHTML = `<textarea id="noticeContent" style="padding: 10px; width: 100%; box-sizing: border-box; font-family: 'DungGeunMo'; border: 2px solid #000; min-height: 100px; resize: none;">${text}</textarea>`;
                            noticeEditBtn.innerText = "💾 Save";
                        }
                    } else {
                        socket.emit('update notice', { password: tempPassword, notice: content.value });
                    }
                }
            });
        }
    </script>
</body>
</html>
