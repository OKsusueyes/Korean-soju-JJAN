<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soju-JJAN</title>
    <style>
        @font-face {
            font-family: 'DungGeunMo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
            font-weight: normal; font-style: normal;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            font-family: 'DungGeunMo', sans-serif;
            background-color: #ffffff;
        }

        #main-area { width: 100%; height: 100%; position: relative; }

        .ui-container {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 10px; z-index: 20;
        }

        .btn-style {
            padding: 8px 12px; font-family: 'DungGeunMo', sans-serif; font-size: 0.9rem;
            background: #fff; border: 3px solid #000; cursor: pointer; color: #000; width: max-content;
        }

        /* 채팅 및 게시판 공통 컨테이너 */
        #chat-wrapper {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; z-index: 20;
        }

        .chat-box { background: rgba(200, 200, 200, 0.6); border: 2px solid #000; padding: 10px; }

        /* 게시판 버튼 스타일 */
        #board-trigger { margin-bottom: 5px; cursor: pointer; text-align: center; font-weight: bold; }

        #chat-log { height: 120px; overflow-y: auto; margin-bottom: 5px; }

        .log-item { font-size: 0.9rem; margin-bottom: 5px; }
        .log-nickname { 
            background: #50C878; color: #000; padding: 2px 5px; margin-right: 5px; font-weight: bold;
        }

        .input-wrapper { display: flex; gap: 5px; }
        input[type="text"] { flex: 1; padding: 8px; border: 2px solid #000; outline: none; font-family: 'DungGeunMo'; }
        #sendBtn { padding: 8px 15px; background: #50C878; color: #000; border: 2px solid #000; cursor: pointer; font-family: 'DungGeunMo'; font-weight: bold; }

        /* 팝업 스타일 */
        .popup { display: none; position: absolute; top: 50%; right: 50px; transform: translateY(-50%); 
                 width: 300px; background: #fff; border: 4px solid #000; z-index: 100; padding: 15px; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

    <div id="main-area">
        <div class="ui-container">
            <button id="noticeToggleBtn" class="btn-style">📢 Notice</button>
        </div>

        <div id="chat-wrapper">
            <div id="board-trigger" class="chat-box" onclick="document.getElementById('boardPopup').style.display='flex'">
                Jeo Gi Yo!🙋🏻‍♀️
            </div>
            <div id="chat-log" class="chat-box"></div>
            <div class="input-wrapper">
                <input type="text" id="chatInput" placeholder="Message..." autocomplete="off">
                <button id="sendBtn">JJAN!</button>
            </div>
        </div>
    </div>

    <div id="boardPopup" class="popup">
        <div style="display:flex; justify-content:space-between;"><b>Jeo Gi Yo Request</b><button onclick="this.parentElement.parentElement.style.display='none'">X</button></div>
        <input type="text" id="boardInput" placeholder="Type request...">
        <button id="boardSubmitBtn" class="btn-style">Post</button>
        <div id="boardList" style="height: 200px; overflow-y: auto; border: 1px solid #000; padding: 5px;"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatLog = document.getElementById('chat-log');
        const boardSubmitBtn = document.getElementById('boardSubmitBtn');
        const boardInput = document.getElementById('boardInput');
        const boardList = document.getElementById('boardList');

        socket.on('chat message', (data) => {
            const div = document.createElement('div');
            div.className = 'log-item';
            div.innerHTML = `<span class="log-nickname">${data.nickname}</span> ${data.message}`;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        });

        sendBtn.onclick = () => {
            socket.emit('chat message', { nickname: "User", message: chatInput.value });
            chatInput.value = '';
        };

        boardSubmitBtn.onclick = () => {
            socket.emit('save board message', { nickname: "Guest", message: boardInput.value });
            boardInput.value = '';
        };

        socket.on('load board', (messages) => {
            boardList.innerHTML = '';
            messages.forEach(m => {
                const item = document.createElement('div');
                item.style.marginBottom = "5px";
                item.innerHTML = `<b>[${m.nickname}]</b> ${m.message}`;
                boardList.appendChild(item);
            });
        });
    </script>
</body>
</html>
