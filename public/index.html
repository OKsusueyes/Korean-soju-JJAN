<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Soju-JJAN 🍻</title>
    <style>
        @font-face {
            font-family: 'DungGeunMo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
            font-weight: normal; font-style: normal;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            font-family: 'DungGeunMo', sans-serif;
            background-color: #ffffff; /* 하얀색 배경으로 변경 */
        }

        /* 메인 영역 */
        #main-area { width: 100%; height: 100%; position: relative; }

        /* UI 컨테이너 (왼쪽 상단) */
        .ui-container {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 10px; z-index: 20;
        }

        .btn-style {
            padding: 8px 12px; font-family: 'DungGeunMo', sans-serif; font-size: 0.9rem;
            background: #fff; border: 3px solid #000; box-shadow: 4px 4px 0px #000;
            cursor: pointer; text-decoration: none; color: #000; width: max-content;
        }

        /* 🌟 하단 중앙 채팅창 컨테이너 */
        #chat-wrapper {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px;
            display: flex; flex-direction: column;
            gap: 5px; z-index: 20;
        }

        /* 채팅 로그 및 입력창 공통 디자인 */
        .chat-box {
            background: rgba(200, 200, 200, 0.6); /* 투명한 회색 */
            border: 2px solid #000;
            padding: 10px;
        }

        #chat-log {
            height: 150px; overflow-y: auto;
            margin-bottom: 5px;
        }

        .log-item { font-size: 0.9rem; margin-bottom: 5px; }
        .log-nickname { 
            background: #1B4B27; color: #fff; padding: 2px 5px; margin-right: 5px; font-weight: bold;
        }

        .input-wrapper { display: flex; gap: 5px; }
        input[type="text"] {
            flex: 1; padding: 8px; border: 2px solid #000; outline: none; font-family: 'DungGeunMo';
        }
        #sendBtn {
            padding: 8px 15px; background: #1B4B27; color: #fff; 
            border: 2px solid #000; cursor: pointer; font-family: 'DungGeunMo'; font-weight: bold;
        }

        /* 팝업 스타일 생략 (기존과 동일) */
        .popup { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 400px; background: #fff; border: 4px solid #000; z-index: 100; padding: 15px; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

    <div id="main-area">
        <div class="ui-container">
            <button id="noticeToggleBtn" class="btn-style">📢 Notice</button>
            <button id="boardToggleBtn" class="btn-style">✨ Drop a vibe</button>
        </div>

        <!-- 하단 중앙 채팅창 -->
        <div id="chat-wrapper">
            <div id="chat-log" class="chat-box"></div>
            <div class="input-wrapper">
                <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off">
                <button id="sendBtn">JJAN!</button>
            </div>
        </div>
    </div>

    <!-- 팝업들 (HTML 구조) -->
    <div id="noticePopup" class="popup">...</div>
    <div id="boardPopup" class="popup">...</div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatLog = document.getElementById('chat-log');

        function appendToChatLog(nickname, text) {
            const div = document.createElement('div');
            div.classList.add('log-item');
            div.innerHTML = `<span class="log-nickname">${nickname}</span> ${text}`;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        socket.on('chat message', (data) => { appendToChatLog(data.nickname, data.message); });

        function sendMessage() {
            const text = chatInput.value.trim();
            if(!text) return;
            socket.emit('chat message', { nickname: "User", message: text });
            chatInput.value = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
