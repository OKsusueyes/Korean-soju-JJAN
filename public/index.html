<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Soju-JJAN 🍻</title>
    <style>
        @font-face {
            font-family: 'DungGeunMo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
            font-weight: normal; font-style: normal;
        }

        /* 🌟 전체 화면을 Flexbox로 설정하여 좌/우 분할 */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            font-family: 'DungGeunMo', sans-serif;
            display: flex; /* 가로로 배치 */
            background-color: #111;
        }

        /* 🌟 왼쪽: 고깃집 배경이 들어갈 넓은 영역 (화면의 남는 공간을 모두 차지함) */
        #bg-area {
            flex: 1; /* 남은 공간 모두 차지 */
            position: relative;
            background-color: #2b2b2b; /* 임시 배경색 */
            /* 나중에 여기에 배경 이미지를 넣으시면 됩니다: */
            /* background-image: url('k-bbq.jpg'); */
            background-size: cover;
            background-position: center;
        }

        /* 🌟 오른쪽: 채팅창 영역 (고정 너비 350px) */
        #chat-panel {
            width: 350px;
            background-color: rgba(255, 255, 255, 0.95);
            border-left: 3px solid #000;
            display: flex;
            flex-direction: column;
            box-shadow: -4px 0px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* UI 버튼들을 배경 영역 좌측 상단에 띄움 */
        .ui-container {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 10px;
        }

        .btn-style {
            padding: 8px 12px; font-family: 'DungGeunMo', sans-serif; font-size: 0.9rem;
            background: #fff; border: 3px solid #000; box-shadow: 4px 4px 0px #000;
            cursor: pointer; text-decoration: none; color: #000; width: max-content;
        }
        .btn-style:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }

        /* 채팅 로그 영역 */
        #chat-log {
            flex: 1; /* 채팅창 내에서 남는 높이 모두 차지 */
            padding: 15px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 8px;
        }
        .log-item { font-size: 0.9rem; word-break: break-all; }
        .log-nickname { background: #000; color: #fff; padding: 2px 5px; margin-right: 5px; }

        /* 채팅 입력 영역 */
        .input-wrapper {
            display: flex; padding: 10px; background: #fff; border-top: 3px solid #000;
        }
        input[type="text"] {
            flex: 1; padding: 8px; font-family: 'DungGeunMo', sans-serif;
            border: 2px solid #000; outline: none; font-size: 0.9rem;
        }
        #sendBtn {
            margin-left: 5px; padding: 8px 15px; font-family: 'DungGeunMo', sans-serif;
            background: #ffcc00; border: 2px solid #000; cursor: pointer;
        }

        /* 팝업창 스타일 (이전 프로젝트와 동일) */
        .popup {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 400px; background: #fff; border: 4px solid #000;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.5); z-index: 100; padding: 15px;
            flex-direction: column; gap: 10px;
        }
        .popup-header { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 5px; }
        .close-btn { background: none; border: none; font-family: 'DungGeunMo', sans-serif; font-size: 1.2rem; cursor: pointer; }

        /* 짠! (JJAN) 애니메이션 요소 */
        .jjan-effect {
            position: absolute; color: #fff; font-size: 1.5rem; font-weight: bold;
            text-shadow: 2px 2px 0px #000; pointer-events: none;
            animation: floatUp 1s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }

        @media (max-width: 768px) {
            body, html { flex-direction: column; } /* 모바일에서는 세로 배치 */
            #bg-area { flex: 0.6; } /* 배경이 위쪽 차지 */
            #chat-panel { width: 100%; flex: 0.4; border-left: none; border-top: 3px solid #000; } /* 채팅이 아래쪽 차지 */
        }
    </style>
</head>
<body>

    <!-- 왼쪽 영역: 배경 및 버튼 -->
    <div id="bg-area">
        <div class="ui-container">
            <button id="noticeToggleBtn" class="btn-style">📢 Notice</button>
            <a href="#" target="_blank" class="btn-style">💡 Update Notes</a>
            <!-- 미국 MZ 용어로 번역된 댓글달기 버튼 -->
            <button id="boardToggleBtn" class="btn-style">✨ Drop a vibe</button>
        </div>
    </div>

    <!-- 오른쪽 영역: 채팅 패널 -->
    <div id="chat-panel">
        <div style="background: #000; color: #fff; text-align: center; padding: 10px; font-size: 1.1rem;">
            🍻 JJAN CHAT 🍻
        </div>
        <div id="chat-log"></div>
        <div class="input-wrapper">
            <input type="text" id="chatInput" maxlength="30" placeholder="Type a message..." autocomplete="off">
            <button id="sendBtn">JJAN!</button>
        </div>
    </div>

    <!-- 공지사항 팝업 -->
    <div id="noticePopup" class="popup">
        <div class="popup-header">
            <span>📢 Notice</span>
            <button id="noticeCloseBtn" class="close-btn">X</button>
        </div>
        <div id="noticeContent" style="padding: 10px; background: #eee; border: 2px solid #000; min-height: 100px; white-space: pre-wrap;">
            Loading...
        </div>
        <button id="noticeEditBtn" class="btn-style" style="align-self: flex-end; font-size: 0.8rem;">✏️ Edit (Admin)</button>
    </div>

    <!-- 방명록(Vibe) 팝업 -->
    <div id="boardPopup" class="popup">
        <div class="popup-header">
            <span>✨ Drop your vibe here</span>
            <button id="boardCloseBtn" class="close-btn">X</button>
        </div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="boardInput" style="flex: 1; padding: 5px; font-family: 'DungGeunMo', sans-serif;" placeholder="What's the tea?" maxlength="40">
            <button id="boardSubmitBtn" class="btn-style" style="padding: 5px 10px;">Post</button>
        </div>
        <div id="boardList" style="flex: 1; height: 150px; overflow-y: auto; background: #fafafa; border: 2px solid #000; padding: 5px;"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // 닉네임 랜덤 생성 (미국 감성)
        const adjectives = ["Cool", "Chill", "Dope", "Savage", "Boujee", "Lit", "Wild"];
        const nouns = ["Tiger", "Bear", "Soju", "Kimchi", "BBQ", "Seoul", "Seoulite"];
        const myNickname = adjectives[Math.floor(Math.random() * adjectives.length)] + " " + nouns[Math.floor(Math.random() * nouns.length)];

        // 채팅 로직
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatLog = document.getElementById('chatLog');
        const bgArea = document.getElementById('bg-area');

        socket.emit('user connect', myNickname);

        function appendToChatLog(nickname, text) {
            const div = document.createElement('div');
            div.classList.add('log-item');
            div.innerHTML = `<span class="log-nickname">${nickname}</span> ${text}`;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        socket.on('chat message', (data) => {
            appendToChatLog(data.nickname, data.message);
        });

        // 배경화면에 '짠!' 이펙트 만들기
        function createJjanEffect() {
            const effect = document.createElement('div');
            effect.classList.add('jjan-effect');
            effect.innerText = "🍻 짠!";
            // 배경 영역의 랜덤한 위치에 이펙트 표시
            effect.style.left = (Math.random() * 80 + 10) + '%';
            effect.style.top = (Math.random() * 80 + 10) + '%';
            bgArea.appendChild(effect);
            setTimeout(() => effect.remove(), 1000);
        }

        function sendMessage() {
            const text = chatInput.value.trim();
            if(!text) return;
            socket.emit('chat message', { nickname: myNickname, message: text });
            chatInput.value = '';
            createJjanEffect(); // 메시지를 보낼 때마다 짠! 이펙트
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        // 팝업 열기/닫기 공통 함수
        const togglePopup = (btnId, popupId, closeId) => {
            document.getElementById(btnId).addEventListener('click', () => {
                document.getElementById(popupId).style.display = 'flex';
            });
            document.getElementById(closeId).addEventListener('click', () => {
                document.getElementById(popupId).style.display = 'none';
            });
        };

        togglePopup('noticeToggleBtn', 'noticePopup', 'noticeCloseBtn');
        togglePopup('boardToggleBtn', 'boardPopup', 'boardCloseBtn');

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('noticePopup').style.display = 'none';
                document.getElementById('boardPopup').style.display = 'none';
            }
        });

        // 방명록 (Drop a vibe) 로직
        const boardSubmitBtn = document.getElementById('boardSubmitBtn');
        const boardInput = document.getElementById('boardInput');
        const boardList = document.getElementById('boardList');

        boardSubmitBtn.addEventListener('click', () => {
            const text = boardInput.value.trim();
            if(!text) return;
            socket.emit('save board message', { nickname: myNickname, message: text });
            boardInput.value = '';
        });

        socket.on('load board', (messages) => {
            boardList.innerHTML = '';
            messages.forEach(data => {
                const item = document.createElement('div');
                item.style.borderBottom = "1px dashed #ccc";
                item.style.padding = "4px 0";
                item.style.fontSize = "0.85rem";
                item.innerHTML = `<b>[${data.nickname}]</b> ${data.message}`;
                boardList.appendChild(item);
            });
        });

        // 공지사항 (Notice) 로직
        const noticeEditBtn = document.getElementById('noticeEditBtn');
        let tempPassword = "";

        socket.on('load notice', (noticeText) => {
            const content = document.getElementById('noticeContent');
            if (content.tagName === 'TEXTAREA') {
                content.outerHTML = `<div id="noticeContent" style="padding: 10px; background: #eee; border: 2px solid #000; min-height: 100px; white-space: pre-wrap;"></div>`;
                noticeEditBtn.innerText = "✏️ Edit (Admin)";
            }
            document.getElementById('noticeContent').innerText = noticeText;
        });

        socket.on('notice error', () => alert("Incorrect Password! 🙅‍♂️"));

        noticeEditBtn.addEventListener('click', () => {
            const content = document.getElementById('noticeContent');
            if (content.tagName === 'DIV') {
                const pwd = prompt("Enter Admin Password:");
                if (pwd) {
                    tempPassword = pwd;
                    const text = content.innerText;
                    content.outerHTML = `<textarea id="noticeContent" style="padding: 10px; width: 100%; box-sizing: border-box; font-family: 'DungGeunMo'; border: 2px solid #000; min-height: 100px; resize: none;">${text}</textarea>`;
                    noticeEditBtn.innerText = "💾 Save";
                }
            } else {
                socket.emit('update notice', { password: tempPassword, notice: content.value });
            }
        });
    </script>
</body>
</html>
