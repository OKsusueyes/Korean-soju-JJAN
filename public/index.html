<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soju-JJAN</title>
    <style>
        @font-face {
            font-family: 'DungGeunMo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
            font-weight: normal; font-style: normal;
        }

        /* 전체 폰트 둥근모꼴 강제 적용 */
        * { font-family: 'DungGeunMo', sans-serif; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #ffffff;
        }

        #main-area { width: 100%; height: 100%; position: relative; }

        .ui-container { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 20; }
        .btn-style { padding: 8px 12px; background: #fff; border: 3px solid #000; cursor: pointer; color: #000; width: max-content; }

        /* 채팅 컨테이너 */
        #chat-wrapper {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; z-index: 20;
        }

        /* 저기요! 버튼 너비 최적화 */
        #board-trigger { 
            background: rgba(255, 255, 255, 0.5); border: 2px solid #000; 
            padding: 10px 20px; text-align: center; font-weight: bold; font-size: 1.3rem; 
            cursor: pointer; width: max-content; margin: 0 auto; 
        }

        #chat-log { height: 120px; overflow-y: auto; background: rgba(200, 200, 200, 0.6); border: 2px solid #000; padding: 10px; }
        .log-item { font-size: 0.9rem; margin-bottom: 5px; }
        
        /* 닉네임 배경 (소주병 초록색 + 검정 글씨) */
        .log-nickname { background: #50C878; color: #000; padding: 2px 5px; margin-right: 5px; font-weight: bold; display: inline-block; border-radius: 4px; }

        .input-wrapper { display: flex; gap: 5px; }
        input[type="text"] { flex: 1; padding: 8px; border: 2px solid #000; outline: none; }
        #sendBtn { padding: 8px 15px; background: #50C878; color: #000; border: 2px solid #000; cursor: pointer; font-weight: bold; }

        /* 공통 팝업 스타일 */
        .popup { 
            display: none; position: absolute; background: #333; padding: 20px; border-radius: 5px; z-index: 100; 
            box-shadow: 10px 10px 0px rgba(0,0,0,0.3); border: 4px solid #000;
        }
        
        /* 영수증 결재판 팝업 위치 변경 (오른쪽 길게) */
        #boardPopup {
            top: 20px; left: auto; right: 20px; transform: none; 
            width: 320px; height: calc(100% - 40px);
            display: none; flex-direction: column; gap: 10px; box-sizing: border-box;
        }

        .receipt-paper { 
            background: #fff; padding: 20px; border: 1px solid #ccc; 
            flex: 1; display: flex; flex-direction: column; overflow: hidden; 
        }
        
        .close-btn { background: none; border: none; cursor: pointer; }

        /* 입력창 안쪽 회색 기울임 글씨 적용 */
        #boardInput::placeholder { font-style: italic; color: #888; }

        /* 짠! 말풍선 이펙트 */
        .jjan-effect {
            position: absolute; padding: 10px; background: #fff; border: 2px solid #000;
            border-radius: 50% 50% 50% 0; font-weight: bold; animation: popUp 0.5s ease-out forwards; pointer-events: none;
        }
        @keyframes popUp { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="main-area">
        <div class="ui-container">
            <button id="noticeToggleBtn" class="btn-style">📢 Notice</button>
        </div>

        <div id="chat-wrapper">
            <div id="board-trigger" onclick="document.getElementById('boardPopup').style.display='flex'">Jeo Gi Yo!🙋🏻‍♀️</div>
            <div id="chat-log"></div>
            <div class="input-wrapper">
                <input type="text" id="chatInput" maxlength="30" placeholder="Message... (Max 30 chars)" autocomplete="off">
                <button id="sendBtn">JJAN!</button>
            </div>
        </div>
    </div>

    <div id="boardPopup" class="popup">
        <div style="color: white; display: flex; justify-content: space-between;">
            <b>Receipt</b>
            <button class="close-btn" style="color:white" onclick="document.getElementById('boardPopup').style.display='none'">X</button>
        </div>
        <div class="receipt-paper">
            <button id="boardSubmitBtn" class="btn-style" style="margin: 0 auto 15px auto;">Add Order</button>
            
            <input type="text" id="boardInput" style="width:80%; padding:4px 0; border:none; border-bottom:1px solid #aaa; background:transparent; outline:none; box-sizing:border-box; margin: 0 auto; display: block; text-align: center; font-size:0.9rem;" placeholder="Text...">
            
            <hr style="width: 100%; border: 1px dashed #ccc; margin: 15px 0;">
            
            <div id="boardList" style="flex: 1; overflow-y: auto; padding-right: 5px;"></div>
        </div>
    </div>

    <div id="noticePopup" class="popup" style="top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px;">
        <div style="color: white; display: flex; justify-content: space-between;">
            <b>📢 Notice</b>
            <button class="close-btn" style="color:white" onclick="document.getElementById('noticePopup').style.display='none'">X</button>
        </div>
        <div id="noticeContent" style="padding: 15px; background: #fff; border: 2px solid #000; min-height: 100px; white-space: pre-wrap; margin-top: 10px;">
            Loading...
        </div>
        <button id="noticeEditBtn" class="btn-style" style="align-self: flex-end; margin-top: 10px; font-size: 0.8rem;">✏️ Edit (Admin)</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // 닉네임 변경: Guest + 숫자 2자리
        const randomNum = String(Math.floor(Math.random() * 100)).padStart(2, '0');
        const myNickname = "Guest" + randomNum;

        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatLog = document.getElementById('chat-log');

        // 채팅 전송
        function sendMessage() {
            const text = chatInput.value.trim();
            if(!text) return; 
            socket.emit('chat message', { nickname: myNickname, message: text });
            chatInput.value = '';
        }

        sendBtn.onclick = sendMessage;
        chatInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

        socket.on('chat message', (data) => {
            const div = document.createElement('div');
            div.className = 'log-item';
            div.innerHTML = `<span class="log-nickname">${data.nickname}</span> ${data.message}`;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
            
            // 짠! 말풍선 효과
            const eff = document.createElement('div');
            eff.className = 'jjan-effect';
            eff.innerText = "짠!";
            eff.style.left = (Math.random() * 60 + 20) + '%';
            eff.style.top = (Math.random() * 60 + 20) + '%';
            document.body.appendChild(eff);
            setTimeout(() => eff.remove(), 800);
        });

        // ESC로 모든 팝업 닫기
        window.addEventListener('keydown', (e) => { 
            if(e.key === 'Escape') {
                document.getElementById('boardPopup').style.display = 'none'; 
                document.getElementById('noticePopup').style.display = 'none';
            }
        });

        document.getElementById('noticeToggleBtn').onclick = () => {
            document.getElementById('noticePopup').style.display = 'flex';
        }

        // 영수증 게시판 전송 로직
        document.getElementById('boardSubmitBtn').onclick = () => {
            const text = document.getElementById('boardInput').value.trim();
            if(!text) return;
            socket.emit('save board message', { nickname: myNickname, message: text });
            document.getElementById('boardInput').value = '';
        };

        // 영수증 내역 불러오기 (글자 크기 축소 적용)
        socket.on('load board', (msgs) => {
            const list = document.getElementById('boardList');
            list.innerHTML = msgs.map(m => `
                <div class="log-item" style="margin-bottom: 8px; font-size: 0.75rem;">
                    <span class="log-nickname" style="padding: 1px 3px; font-size: 0.7rem; margin-right: 4px;">${m.nickname}</span> ${m.message}
                </div>
            `).join('');
        });

        // 공지사항 (Notice) 로직
        const noticeEditBtn = document.getElementById('noticeEditBtn');
        let tempPassword = "";

        socket.on('load notice', (noticeText) => {
            const content = document.getElementById('noticeContent');
            if(content) {
                if (content.tagName === 'TEXTAREA') {
                    content.outerHTML = `<div id="noticeContent" style="padding: 15px; background: #fff; border: 2px solid #000; min-height: 100px; white-space: pre-wrap; margin-top: 10px;"></div>`;
                    if(noticeEditBtn) noticeEditBtn.innerText = "✏️ Edit (Admin)";
                }
                const updatedContent = document.getElementById('noticeContent');
                if(updatedContent) updatedContent.innerText = noticeText;
            }
        });

        socket.on('notice error', () => alert("Incorrect Password! 🙅‍♂️"));

        if(noticeEditBtn) {
            noticeEditBtn.addEventListener('click', () => {
                const content = document.getElementById('noticeContent');
                if(content) {
                    if (content.tagName === 'DIV') {
                        const pwd = prompt("Enter Admin Password:");
                        if (pwd) {
                            tempPassword = pwd;
                            const text = content.innerText;
                            content.outerHTML = `<textarea id="noticeContent" style="padding: 15px; width: 100%; box-sizing: border-box; font-family: 'DungGeunMo'; border: 2px solid #000; min-height: 100px; resize: none; margin-top: 10px;">${text}</textarea>`;
                            noticeEditBtn.innerText = "💾 Save";
                        }
                    } else {
                        socket.emit('update notice', { password: tempPassword, notice: content.value });
                    }
                }
            });
        }
    </script>
</body>
</html>
