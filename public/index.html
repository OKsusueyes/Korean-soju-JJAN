<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soju-JJAN</title>
    <style>
        @font-face {
            font-family: 'DungGeunMo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
            font-weight: normal; font-style: normal;
        }

        /* 전체 폰트 둥근모꼴 강제 적용 */
        * { font-family: 'DungGeunMo', sans-serif; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #ffffff;
        }

        #main-area { width: 100%; height: 100%; position: relative; z-index: 1; }

        .ui-container { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 20; }
        .btn-style { padding: 8px 12px; background: #fff; border: 3px solid #000; cursor: pointer; color: #000; width: max-content; }

        /* 채팅 컨테이너 */
        #chat-wrapper {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; z-index: 20;
        }

        /* 저기요! 버튼 */
        #board-trigger { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 30;
            background: rgba(255, 255, 255, 0.5); border: 2px solid #000; 
            padding: 10px 20px; text-align: center; font-weight: bold; font-size: 1.3rem; 
            cursor: pointer; width: max-content; 
        }

        #chat-log { height: 120px; overflow-y: auto; background: rgba(200, 200, 200, 0.6); border: 2px solid #000; padding: 10px; }
        .log-item { font-size: 0.9rem; margin-bottom: 5px; }
        
        .log-nickname { background: #50C878; color: #000; padding: 2px 5px; margin-right: 5px; font-weight: bold; display: inline-block; border-radius: 4px; }

        .input-wrapper { display: flex; gap: 5px; }
        input[type="text"] { flex: 1; padding: 8px; border: 2px solid #000; outline: none; }
        #sendBtn { padding: 8px 15px; background: #50C878; color: #000; border: 2px solid #000; cursor: pointer; font-weight: bold; }

        /* 공통 팝업 스타일 */
        .popup { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 320px; background: #fff; padding: 20px; border-radius: 5px; z-index: 100; 
            box-shadow: 10px 10px 0px rgba(0,0,0,0.3); border: 4px solid #000;
            flex-direction: column; gap: 10px; box-sizing: border-box;
        }
        
        /* 메뉴 버튼 전용 스타일 */
        .menu-btn {
            width: 100%; padding: 12px; font-size: 1rem; border-radius: 6px;
            background: #fff; border: 2px solid #000; cursor: pointer; font-weight: bold;
            font-family: 'DungGeunMo', sans-serif; box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .menu-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px rgba(0,0,0,0.2); }

        /* 영수증 팝업 전용 스타일 */
        #boardPopup {
            top: 20px; left: auto; right: 20px; transform: none; height: calc(100% - 40px); 
            background: #F5F5F5; border-radius: 12px; box-shadow: 8px 8px 0px rgba(80, 200, 120, 0.5); 
            display: none; flex-direction: column; 
        }

        .close-btn { background: none; border: none; cursor: pointer; font-family: 'DungGeunMo', sans-serif; }
        #boardInput::placeholder { font-style: italic; color: #888; }

        /* 🌟 수정됨: 애니메이션이 다른 UI를 가리지 않도록 z-index를 10으로 낮춤 */
        .toast-wrapper {
            position: absolute; width: 160px; height: 120px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            animation: fadeOutWrapper 1.2s ease-in-out forwards; 
        }

        .toast-text {
            position: absolute; font-size: 3.5rem; color: #fff700; font-weight: bold;
            text-shadow: 3px 3px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000;
            z-index: 1; opacity: 0; top: 0;
            animation: textPopUp 1.2s ease-in-out forwards;
        }

        .toast-glass-container {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: space-between; align-items: flex-end;
            z-index: 2;
        }

        .hand-left { animation: clinkLeft 1.2s ease-in-out forwards; }
        .hand-right { animation: clinkRight 1.2s ease-in-out forwards; }
        .liquid-group { animation: splashLiquid 1.2s ease-in-out forwards; transform-origin: bottom center; }

        .pixel-drop {
            position: absolute; width: 6px; height: 6px; background: #A5F3FC; border: 2px solid #000;
            z-index: 3; opacity: 0;
        }
        .drop1 { top: 20px; left: 60px; animation: dropsPop1 1.2s ease-in-out forwards; }
        .drop2 { top: 10px; left: 80px; animation: dropsPop2 1.2s ease-in-out forwards; }
        .drop3 { top: 25px; left: 100px; animation: dropsPop3 1.2s ease-in-out forwards; }

        @keyframes fadeOutWrapper {
            0%, 75% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -60%); }
        }
        
        @keyframes textPopUp {
            0%, 35% { transform: scale(0.5) translateY(20px); opacity: 0; }
            40% { transform: scale(1.1) translateY(-15px) rotate(-5deg); opacity: 1; }
            45%, 75% { transform: scale(1) translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: scale(1) translateY(-10px); opacity: 0; }
        }

        @keyframes clinkLeft {
            0% { transform: translateX(-60px) translateY(10px) rotate(-15deg); opacity: 0; }
            15% { opacity: 1; }
            40%, 55% { transform: translateX(5px) translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateX(5px) translateY(0) rotate(0deg); opacity: 1; }
        }

        @keyframes clinkRight {
            0% { transform: translateX(60px) translateY(10px) rotate(15deg); opacity: 0; }
            15% { opacity: 1; }
            40%, 55% { transform: translateX(-5px) translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateX(-5px) translateY(0) rotate(0deg); opacity: 1; }
        }

        @keyframes splashLiquid {
            0%, 35% { transform: translateY(0); }
            40% { transform: translateY(-3px); }
            50% { transform: translateY(1px); }
            65%, 100% { transform: translateY(0); }
        }

        @keyframes dropsPop1 { 0%, 35% { transform: scale(0) translateY(0); opacity: 0; } 40% { transform: scale(1) translateY(-15px); opacity: 1; } 60%, 100% { transform: scale(0) translateY(-25px); opacity: 0; } }
        @keyframes dropsPop2 { 0%, 37% { transform: scale(0) translateY(0); opacity: 0; } 42% { transform: scale(1.2) translateY(-20px); opacity: 1; } 65%, 100% { transform: scale(0) translateY(-35px); opacity: 0; } }
        @keyframes dropsPop3 { 0%, 39% { transform: scale(0) translateY(0); opacity: 0; } 44% { transform: scale(0.8) translateY(-10px); opacity: 1; } 62%, 100% { transform: scale(0) translateY(-20px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="main-area">
        <div class="ui-container">
            <button id="noticeToggleBtn" class="btn-style">📢 Notice</button>
            
            <div id="counterBoard" class="btn-style" style="cursor: default; text-align: left; font-size: 0.9rem; line-height: 1.5; padding: 10px;">
                🍾 Soju: <span id="sojuCountText">0</span><br>
                🥤 Soda: <span id="sodaCountText">0</span>
            </div>
        </div>

        <div id="board-trigger" onclick="document.getElementById('menuPopup').style.display='flex'">
            Jeo Gi Yo!🙋🏻‍♀️
        </div>

        <div id="chat-wrapper">
            <div id="chat-log"></div>
            <div class="input-wrapper">
                <input type="text" id="chatInput" maxlength="30" placeholder="Message... (Max 30 chars)" autocomplete="off">
                <button id="sendBtn">JJAN!</button>
            </div>
        </div>
    </div>

    <div id="menuPopup" class="popup">
        <div style="color: #000; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed #ccc; padding-bottom: 10px;">
            <b style="font-size: 1.1rem;">🔔 Options</b>
            <button class="close-btn" style="color:#000; font-weight: bold; font-size: 1.1rem;" onclick="document.getElementById('menuPopup').style.display='none'">X</button>
        </div>
        <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 15px;">
            <button class="menu-btn" onclick="addSoju()">Add Soju</button>
            <button class="menu-btn" onclick="addSoda()">Add Soda</button>
            
            <button class="menu-btn" onclick="window.open('https://docs.google.com/forms/d/1xkJdB_npCP-J09uFE-vsyuvH-VC7SKgii2T2p6Gnx7A/edit', '_blank'); document.getElementById('menuPopup').style.display='none';">Other Request</button>
            
            <button class="menu-btn" onclick="openInquiriesBoard()" style="background: #50C878; border-color: #000;">Call the Sa-Jang-Nim(Boss)</button>
        </div>
    </div>

    <div id="boardPopup" class="popup">
        <div style="color: #000; border-bottom: 2px dashed #ccc; padding-bottom: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <b style="font-size: 1.1rem;">📝 Inquiries !!!</b>
                <button class="close-btn" style="color:#000; font-weight: bold; font-size: 1.1rem;" onclick="document.getElementById('boardPopup').style.display='none'">X</button>
            </div>
            <div style="font-size: 0.75rem; color: #888; font-style: italic; margin-top: 4px;">Leave a Message to Sujin</div>
        </div>
        
        <div style="display: flex; flex-direction: column; margin-top: 15px; flex: 1; overflow: hidden;">
            <div style="display: flex; gap: 8px; width: 100%; box-sizing: border-box; padding-bottom: 6px;">
                <input type="text" id="boardInput" style="flex: 1; width: 150px; height: 33px; padding: 0 10px; border: 2px solid #000; border-radius: 6px; background: #fff; outline: none; box-sizing: border-box; text-align: left; font-size: 0.8rem;" placeholder="Order...">
                <button id="boardSubmitBtn" class="btn-style" style="height: 33px; margin: 0; padding: 0 15px; border-radius: 6px; display: flex; align-items: center; justify-content: center; background: #50C878; font-weight: normal; font-size: 0.8rem; flex-shrink: 0; box-sizing: border-box; line-height: 1;">Clame💢</button>
            </div>
            <hr style="width: 100%; border: 1px dashed #ccc; margin: 10px 0 15px 0; flex-shrink: 0;">
            <div id="boardList" style="flex: 1; overflow-y: auto; padding-right: 5px; display: flex; flex-direction: column; gap: 8px;"></div>
        </div>
    </div>

    <div id="noticePopup" class="popup">
        <div style="color: #000; display: flex; justify-content: space-between;">
            <b>📢 Notice</b>
            <button class="close-btn" style="color:#000;" onclick="document.getElementById('noticePopup').style.display='none'">X</button>
        </div>
        <div id="noticeContent" style="padding: 15px; background: #f9f9f9; border: 2px solid #000; min-height: 100px; white-space: pre-wrap; margin-top: 10px;">
            Loading...
        </div>
        <button id="noticeEditBtn" class="btn-style" style="align-self: flex-end; margin-top: 10px; font-size: 0.8rem;">✏️ Edit (Admin)</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        const randomNum = String(Math.floor(Math.random() * 100)).padStart(2, '0');
        const myNickname = "Guest" + randomNum;

        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatLog = document.getElementById('chat-log');

        let myChatCount = 0;
        let sojuBottleCount = 0;
        let sodaBottleCount = 0;

        function updateCounterUI() {
            document.getElementById('sojuCountText').innerText = sojuBottleCount;
            document.getElementById('sodaCountText').innerText = sodaBottleCount;
        }

        function addSoju() {
            sojuBottleCount++;
            updateCounterUI();
        }

        function addSoda() {
            sodaBottleCount++;
            updateCounterUI();
        }

        const leftHandSVG = `
            <svg viewBox="0 0 20 20" width="80" height="80" shape-rendering="crispEdges">
                <g class="liquid-group">
                    <rect x="5" y="6" width="10" height="1" fill="#A5F3FC"/>
                    <rect x="5" y="7" width="10" height="1" fill="#CFFAFE"/>
                    <rect x="6" y="8" width="8" height="4" fill="#CFFAFE"/>
                    <rect x="7" y="12" width="6" height="3" fill="#CFFAFE"/>
                </g>
                <rect x="5" y="3" width="10" height="1" fill="#D1D5DB"/>
                <rect x="4" y="4" width="1" height="4" fill="#D1D5DB"/>
                <rect x="15" y="4" width="1" height="4" fill="#D1D5DB"/>
                <rect x="5" y="8" width="1" height="4" fill="#D1D5DB"/>
                <rect x="14" y="8" width="1" height="4" fill="#D1D5DB"/>
                <rect x="6" y="12" width="1" height="3" fill="#D1D5DB"/>
                <rect x="13" y="12" width="1" height="3" fill="#D1D5DB"/>
                <rect x="7" y="15" width="6" height="1" fill="#D1D5DB"/>
                <rect x="6" y="4" width="1" height="3" fill="#FFF"/>
                
                <rect x="0" y="13" width="6" height="7" fill="#fff4cc"/>
                <rect x="2" y="11" width="5" height="4" fill="#fff4cc"/>
                <rect x="4" y="8" width="4" height="4" fill="#fff4cc"/>
                <rect x="5" y="7" width="2" height="1" fill="#fff4cc"/>
                
                <rect x="4" y="8" width="4" height="1" fill="#B45309" opacity="0.3"/>
                <rect x="4" y="12" width="4" height="1" fill="#B45309" opacity="0.3"/>
            </svg>
        `;

        const rightHandSVG = `
            <svg viewBox="0 0 20 20" width="80" height="80" shape-rendering="crispEdges">
                <g class="liquid-group">
                    <rect x="5" y="6" width="10" height="1" fill="#A5F3FC"/>
                    <rect x="5" y="7" width="10" height="1" fill="#CFFAFE"/>
                    <rect x="6" y="8" width="8" height="4" fill="#CFFAFE"/>
                    <rect x="7" y="12" width="6" height="3" fill="#CFFAFE"/>
                </g>
                <rect x="5" y="3" width="10" height="1" fill="#D1D5DB"/>
                <rect x="4" y="4" width="1" height="4" fill="#D1D5DB"/>
                <rect x="15" y="4" width="1" height="4" fill="#D1D5DB"/>
                <rect x="5" y="8" width="1" height="4" fill="#D1D5DB"/>
                <rect x="14" y="8" width="1" height="4" fill="#D1D5DB"/>
                <rect x="6" y="12" width="1" height="3" fill="#D1D5DB"/>
                <rect x="13" y="12" width="1" height="3" fill="#D1D5DB"/>
                <rect x="7" y="15" width="6" height="1" fill="#D1D5DB"/>
                <rect x="13" y="4" width="1" height="3" fill="#FFF"/>

                <rect x="14" y="10" width="6" height="10" fill="#fff4cc"/>
                <rect x="8" y="7" width="7" height="3" fill="#fff4cc"/>
                <rect x="7" y="10" width="8" height="3" fill="#fff4cc"/>
                <rect x="8" y="13" width="7" height="3" fill="#fff4cc"/>
                
                <rect x="8" y="9" width="7" height="1" fill="#B45309" opacity="0.3"/>
                <rect x="7" y="12" width="8" height="1" fill="#B45309" opacity="0.3"/>
                <rect x="8" y="15" width="7" height="1" fill="#B45309" opacity="0.3"/>
            </svg>
        `;

        function sendMessage() {
            const text = chatInput.value.trim();
            if(!text) return; 
            socket.emit('chat message', { nickname: myNickname, message: text });
            chatInput.value = '';

            myChatCount++;
            if (myChatCount % 10 === 0) {
                sojuBottleCount++;
                updateCounterUI();
            }
        }

        sendBtn.onclick = sendMessage;
        chatInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

        socket.on('chat message', (data) => {
            const div = document.createElement('div');
            div.className = 'log-item';
            div.innerHTML = `<span class="log-nickname">${data.nickname}</span> ${data.message}`;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
            
            const wrapper = document.createElement('div');
            wrapper.className = 'toast-wrapper';
            wrapper.style.left = (Math.random() * 60 + 20) + '%';
            wrapper.style.top = (Math.random() * 60 + 20) + '%';
            
            wrapper.innerHTML = `
                <div class="toast-text">JJAN!</div>
                <div class="toast-glass-container">
                    <div class="pixel-drop drop1"></div>
                    <div class="pixel-drop drop2"></div>
                    <div class="pixel-drop drop3"></div>
                    <div class="hand-left">${leftHandSVG}</div>
                    <div class="hand-right">${rightHandSVG}</div>
                </div>
            `;
            
            document.body.appendChild(wrapper);
            setTimeout(() => wrapper.remove(), 1200);
        });

        window.addEventListener('keydown', (e) => { 
            if(e.key === 'Escape') {
                document.getElementById('boardPopup').style.display = 'none'; 
                document.getElementById('noticePopup').style.display = 'none';
                document.getElementById('menuPopup').style.display = 'none';
            }
        });

        document.getElementById('noticeToggleBtn').onclick = () => {
            document.getElementById('noticePopup').style.display = 'flex';
        }

        function openInquiriesBoard() {
            document.getElementById('menuPopup').style.display = 'none';
            document.getElementById('boardPopup').style.display = 'flex';
        }

        document.getElementById('boardSubmitBtn').onclick = () => {
            const text = document.getElementById('boardInput').value.trim();
            if(!text) return;
            socket.emit('save board message', { nickname: myNickname, message: text });
            document.getElementById('boardInput').value = '';
        };

        document.getElementById('boardInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('boardSubmitBtn').click();
            }
        });

        socket.on('load board', (msgs) => {
            const list = document.getElementById('boardList');
            list.innerHTML = msgs.map(m => `
                <div class="log-item" style="margin-bottom: 0; font-size: 0.8rem; background: #fff; padding: 8px; border: 1px dashed #aaa; border-radius: 6px;">
                    <span class="log-nickname" style="padding: 2px 4px; font-size: 0.75rem; margin-right: 4px;">${m.nickname}</span> ${m.message}
                </div>
            `).join('');
        });

        const noticeEditBtn = document.getElementById('noticeEditBtn');
        let tempPassword = "";

        socket.on('load notice', (noticeText) => {
            const content = document.getElementById('noticeContent');
            if(content) {
                if (content.tagName === 'TEXTAREA') {
                    content.outerHTML = `<div id="noticeContent" style="padding: 15px; background: #f9f9f9; border: 2px solid #000; min-height: 100px; white-space: pre-wrap; margin-top: 10px;"></div>`;
                    if(noticeEditBtn) noticeEditBtn.innerText = "✏️ Edit (Admin)";
                }
                const updatedContent = document.getElementById('noticeContent');
                if(updatedContent) updatedContent.innerText = noticeText;
            }
        });

        socket.on('notice error', () => alert("Incorrect Password! 🙅‍♂️"));

        if(noticeEditBtn) {
            noticeEditBtn.addEventListener('click', () => {
                const content = document.getElementById('noticeContent');
                if(content) {
                    if (content.tagName === 'DIV') {
                        const pwd = prompt("Enter Admin Password:");
                        if (pwd) {
                            tempPassword = pwd;
                            const text = content.innerText;
                            content.outerHTML = `<textarea id="noticeContent" style="padding: 15px; width: 100%; box-sizing: border-box; font-family: 'DungGeunMo'; border: 2px solid #000; min-height: 100px; resize: none; margin-top: 10px;">${text}</textarea>`;
                            noticeEditBtn.innerText = "💾 Save";
                        }
                    } else {
                        socket.emit('update notice', { password: tempPassword, notice: content.value });
                    }
                }
            });
        }
    </script>
</body>
</html>
